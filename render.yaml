services:
  - type: web
    name: mazda-poc
    env: node
    buildCommand: npm run build
    startCommand: node backend/seed.js && node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SF_API_VERSION
        value: "v62.0"
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: VITE_DASHBOARD_URL
        sync: false
      - key: VITE_LOGIN_URL
        sync: false
      - key: SF_LOGIN_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
